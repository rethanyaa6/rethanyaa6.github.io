function FloatingEmoji({ emoji, delay, x, size }) {
  return (
    <div style={{
      position: "absolute",
      left: `${x}%`,
      bottom: "-20px",
      fontSize: `${size}px`,
      animation: `floatUp ${3 + Math.random()}s ease-in ${delay}s forwards`,
      opacity: 0,
      pointerEvents: "none",
    }}>
      {emoji}
    </div>
  );
}

function StarField() {
  const stars = Array.from({length: 30}, (_, i) => ({
    x: Math.random() * 100,
    y: Math.random() * 100,
    size: Math.random() * 3 + 1,
    delay: Math.random() * 3,
    dur: 2 + Math.random() * 2,
  }));
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:0}}>
      {stars.map((s,i) => (
        <div key={i} style={{
          position:"absolute",
          left:`${s.x}%`, top:`${s.y}%`,
          width:s.size, height:s.size,
          borderRadius:"50%",
          background:"white",
          animation:`twinkle ${s.dur}s ease-in-out ${s.delay}s infinite alternate`,
          opacity:0.6,
        }}/>
      ))}
    </div>
  );
}

  .fun-fact {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 16px;
    padding: 1rem;
    color: white;
    font-size: 1rem;
    font-weight: 700;
    line-height: 1.5;
    text-align: center;
    margin-bottom: 1.2rem;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
  }

  .detail-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.7rem;
    margin-bottom: 1rem;
  }

  .detail-stat-tile {
    background: rgba(255,255,255,0.18);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 16px;
    padding: 0.9rem;
    text-align: center;
  }

  .tile-emoji { font-size: 1.8rem; display: block; margin-bottom: 0.3rem; }

  .tile-val {
    font-family: 'Fredoka One', cursive;
    font-size: 1.8rem;
    color: white;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
    line-height: 1;
  }

  .tile-label {
    font-size: 0.75rem;
    font-weight: 800;
    color: rgba(255,255,255,0.8);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 0.2rem;
  }

  .close-btn {
    position: absolute;
    top: 1rem;
    right: 1rem;
    background: rgba(255,255,255,0.25);
    border: 2px solid rgba(255,255,255,0.5);
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 99px;
    cursor: pointer;
    font-size: 1.2rem;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
  }

  .close-btn:hover {
    background: rgba(255,255,255,0.45);
    transform: scale(1.1) rotate(90deg);
  }

  .rain-anim {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
  }

  .rain-line {
    position: absolute;
    width: 2px;
    height: 12px;
    background: rgba(130,200,255,0.6);
    border-radius: 99px;
    animation: rainDrop 1s linear infinite;
  }

  .cloud-deco {
    position: absolute;
    font-size: 5rem;
    opacity: 0.08;
    pointer-events: none;
    animation: cloudFloat 8s ease-in-out infinite;
  }

  .sun-deco {
    position: absolute;
    font-size: 4rem;
    opacity: 0.12;
    pointer-events: none;
    animation: sunSpin 20s linear infinite;
  }
`;

function getTempGradient(high) {
  if (high <= 0)  return "linear-gradient(135deg, #1a3a8f, #4a7abf)";
  if (high <= 8)  return "linear-gradient(135deg, #1a5f8f, #3a9abf)";
  if (high <= 15) return "linear-gradient(135deg, #1a8f5f, #4abf90)";
  if (high <= 22) return "linear-gradient(135deg, #4a8f1a, #90bf3a)";
  if (high <= 28) return "linear-gradient(135deg, #8f7a1a, #e0c030)";
  if (high <= 34) return "linear-gradient(135deg, #8f4a1a, #e07a30)";
  return           "linear-gradient(135deg, #8f1a1a, #e03a20)";
}

function getTempBubbleColor(temp) {
  if (temp <= 0) return "#4a9abf";
  if (temp <= 10) return "#4abf90";
  if (temp <= 20) return "#90c030";
  if (temp <= 28) return "#e0c030";
  if (temp <= 35) return "#e07a30";
  return "#e03a20";
}

function getTempLabel(high) {
  if (high <= 0) return "🥶 Freezing!";
  if (high <= 8) return "🧤 Very Cold";
  if (high <= 15) return "🧥 Chilly";
  if (high <= 20) return "😊 Mild";
  if (high <= 26) return "😎 Warm";
  if (high <= 33) return "🌡️ Hot!";
  return "🔥 Scorching!";
}

function ClimateCalendarKids() {
  const [city, setCity] = useState("🇬🇧 London");
  const [selected, setSelected] = useState(null);
  const [floaters, setFloaters] = useState([]);
  const cityData = CITIES[city];

  function handleCardClick(idx) {
    setSelected(idx === selected ? null : idx);
    const m = cityData.data[idx];
    const newFloaters = Array.from({length: 8}, (_, i) => ({
      id: Date.now() + i,
      emoji: m.emoji,
      x: 10 + Math.random() * 80,
      delay: i * 0.12,
      size: 20 + Math.random() * 20,
    }));
    setFloaters(newFloaters);
    setTimeout(() => setFloaters([]), 4000);
  }

  const sel = selected !== null ? cityData.data[selected] : null;
  const maxRain = Math.max(...cityData.data.map(d => d.rain));

  // Big gradient background cycles through a rich palette
  const bgGradient = "linear-gradient(135deg, #1a0533 0%, #0a1f6e 30%, #0e4f4f 60%, #1a0533 100%)";

  return (
    <>
      <style>{css}</style>
      <div className="app" style={{background: bgGradient, backgroundSize:"400% 400%", animation:"gradientShift 12s ease infinite"}}>
        <StarField />

        {/* Decorative emojis */}
        <div className="cloud-deco" style={{top:"5%",left:"3%",animationDelay:"0s"}}>☁️</div>
        <div className="cloud-deco" style={{top:"8%",right:"5%",animationDelay:"3s",animationDirection:"reverse"}}>☁️</div>
        <div className="sun-deco" style={{top:"3%",right:"15%"}}>⭐</div>

        {/* Floating emojis on click */}
        <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:200,overflow:"hidden"}}>
          {floaters.map(f => <FloatingEmoji key={f.id} emoji={f.emoji} delay={f.delay} x={f.x} size={f.size} />)}
        </div>

        {/* Header */}
        <div className="header">
          <div className="big-title">🌍 World Weather Explorer! 🌤️</div>
          <div style={{display:"block", marginTop:"0.5rem"}}>
            <span className="subtitle-pill">✨ Click a month to discover amazing weather facts! ✨</span>
          </div>
        </div>

        {/* City buttons */}
        <div className="city-bar">
          {Object.keys(CITIES).map(c => (
            <button key={c} className={`city-btn ${city === c ? "active" : ""}`}
              onClick={() => { setCity(c); setSelected(null); }}>
              {c}
            </button>
          ))}
        </div>

        {/* Calendar grid */}
        <div className="calendar-grid">
          {cityData.data.map((d, i) => {
            const gradient = getTempGradient(d.high);
            const rainFrac = d.rain / maxRain;
            return (
              <div
                key={i}
                className={`month-card ${selected === i ? "active-card" : ""}`}
                style={{
                  background: gradient,
                  animationDelay: `${i * 0.06}s`,
                }}
                onClick={() => handleCardClick(i)}
              >
                {/* Decorative circles */}
                <div className="card-bg-circle" style={{width:120,height:120,top:-30,right:-30}} />
                <div className="card-bg-circle" style={{width:70,height:70,bottom:-20,left:-10}} />

                {/* Rain animation if rainy */}
                {d.rain > 80 && (
                  <div className="rain-anim">
                    {Array.from({length: 6}).map((_, j) => (
                      <div key={j} className="rain-line" style={{
                        left:`${10 + j * 15}%`,
                        animationDelay:`${j * 0.18}s`,
                        animationDuration:`${0.8 + j * 0.1}s`,
                      }} />
                    ))}
                  </div>
                )}

                <span className="month-emoji-big" style={{animationDelay:`${i * 0.1}s`}}>{d.emoji}</span>
                <div className="month-name-text">{d.month}</div>

                <div className="temp-bubble-row">
                  <div className="temp-bubble" style={{background: getTempBubbleColor(d.high)}}>
                    🌡️ {d.high}°C
                  </div>
                  <div className="temp-bubble" style={{background: "rgba(255,255,255,0.2)"}}>
                    {d.low}°C
                  </div>
                </div>

                <div className="stat-row">
                  <span className="stat-icon">🌧️</span>
                  <div className="stat-track">
                    <div className="stat-fill" style={{
                      width:`${rainFrac * 100}%`,
                      background:"linear-gradient(90deg,#60b8ff,#b0e0ff)"
                    }} />
                  </div>
                  <span className="stat-num">{d.rain}mm</span>
                </div>

                <div className="stat-row">
                  <span className="stat-icon">☀️</span>
                  <div className="stat-track">
                    <div className="stat-fill" style={{
                      width:`${(d.sun/12)*100}%`,
                      background:"linear-gradient(90deg,#ffd700,#fffb87)"
                    }} />
                  </div>
                  <span className="stat-num">{d.sun}h</span>
                </div>

                {d.snow > 0 && (
                  <div className="snow-dots">
                    {Array.from({length: d.snow}).map((_, j) => (
                      <span key={j} className="snow-dot" style={{animationDelay:`${j*0.3}s`}}>❄️</span>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* Detail overlay */}
        {sel && (
          <div className="detail-overlay" onClick={() => setSelected(null)}>
            <div className="detail-box"
              style={{background: getTempGradient(sel.high)}}
              onClick={e => e.stopPropagation()}>

              <button className="close-btn" onClick={() => setSelected(null)}>✕</button>

              {/* Decorative bg circles */}
              <div className="card-bg-circle" style={{width:200,height:200,top:-60,right:-60,opacity:0.06}} />
              <div className="card-bg-circle" style={{width:120,height:120,bottom:-40,left:-30,opacity:0.07}} />

              <span className="detail-emoji">{sel.emoji}</span>
              <div className="detail-month">{sel.month} in {city.replace(/^[^\s]+ /,"")}</div>

              <div className="fun-fact">💡 {sel.fact}</div>

              <div className="detail-stats">
                <div className="detail-stat-tile">
                  <span className="tile-emoji">🌡️</span>
                  <div className="tile-val">{sel.high}°C</div>
                  <div className="tile-label">High Temp</div>
                </div>
                <div className="detail-stat-tile">
                  <span className="tile-emoji">🧊</span>
                  <div className="tile-val">{sel.low}°C</div>
                  <div className="tile-label">Low Temp</div>
                </div>
                <div className="detail-stat-tile">
                  <span className="tile-emoji">🌧️</span>
                  <div className="tile-val">{sel.rain}mm</div>
                  <div className="tile-label">Rainfall</div>
                </div>
                <div className="detail-stat-tile">
                  <span className="tile-emoji">☀️</span>
                  <div className="tile-val">{sel.sun}h</div>
                  <div className="tile-label">Daily Sun</div>
                </div>
                <div className="detail-stat-tile">
                  <span className="tile-emoji">💧</span>
                  <div className="tile-val">{sel.humidity}%</div>
                  <div className="tile-label">Humidity</div>
                </div>
                <div className="detail-stat-tile">
                  <span className="tile-emoji">😊</span>
                  <div className="tile-val" style={{fontSize:"1rem",paddingTop:"0.3rem"}}>{getTempLabel(sel.high)}</div>
                  <div className="tile-label">Feels Like</div>
                </div>
              </div>
            </div>
          </div>
        )}
      </div>
    </>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ClimateCalendarKids />);
  </script>
</body>
</html>
